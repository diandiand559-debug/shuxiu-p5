<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>接针动态海报</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f1530; /* 深蓝背景 */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }

    #stitch-container {
      width: 80%;
      height: auto;
    }

    /* SVG动画和颜色渐变 */
    path {
      stroke: #46FFF8;
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: drawLine 2s ease-in-out forwards, colorChange 2s ease-in-out forwards;
      will-change: stroke-dashoffset;
    }

    /* 线条绘制动画 */
    @keyframes drawLine {
      to {
        stroke-dashoffset: 0;
      }
    }

    /* 颜色渐变动画 */
    @keyframes colorChange {
      0% { stroke: #46FFF8; }
      50% { stroke: #FF6347; }
      100% { stroke: #46FFF8; }
    }

    /* 文本淡入 */
    text {
      fill: #fff;
      opacity: 0;
      animation: fadeIn 0.8s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<div id="stitch-container">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <path d="M50 50 L350 50" />
    <path d="M50 100 L350 100" />
    <path d="M50 150 L350 150" />
    <text x="50" y="30">接针示意</text>
  </svg>
</div>

<script>
  // 给每条 path 添加顺序延迟，实现逐条绣出
  const paths = document.querySelectorAll('#stitch-container path');
  paths.forEach((p, i) => {
    p.style.animationDelay = `${i * 0.5}s`;
  });

  // 给文本延迟显示
  const texts = document.querySelectorAll('#stitch-container text');
  texts.forEach((t, i) => {
    t.style.animationDelay = `${paths.length * 0.5 + i * 0.3}s`;
  });
</script>

</body>
</html>
