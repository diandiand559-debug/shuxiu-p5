<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>动态海报</title>
  <style>
    body {
      margin: 0;
      background: #101735;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .poster-wrap {
      position: relative;
      width: min(80vw, 900px);
      animation: posterIn 1.2s ease forwards;
    }

    .poster {
      width: 100%;
      display: block;
      border-radius: 0;
    }

    .glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 60% 45%, rgba(70,255,248,0.25), transparent 35%);
      mix-blend-mode: screen;
      animation: breathe 3s ease-in-out infinite alternate;
    }

    .scan-line {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #46fff8, transparent);
      opacity: 0.7;
      animation: scan 4s ease-in-out infinite;
    }

    @keyframes posterIn {
      from {
        opacity: 0;
        transform: scale(0.96);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    @keyframes breathe {
      from { opacity: 0.25; }
      to { opacity: 0.75; }
    }

    @keyframes scan {
      0% { top: 0%; opacity: 0; }
      15% { opacity: 0.8; }
      85% { opacity: 0.8; }
      100% { top: 100%; opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="poster-wrap">
    <img class="poster" src="接针-01.svg" alt="接针动态海报">
    <div class="glow"></div>
    <div class="scan-line"></div>
  </div>
</body>
</html>
